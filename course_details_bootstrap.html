<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ course.name }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-primary">{{ course.name }}</h1>
        <hr>
        
        <h3>Lessons</h3>
        <ul class="list-group">
            {% for lesson in course.lesson_set.all %}
                <li class="list-group-item">
                    {{ lesson.title }}
                </li>
            {% empty %}
                <li class="list-group-item text-muted">No lessons available for this course.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
